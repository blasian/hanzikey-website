<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · HanziKey{% else %}HanziKey{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="icon" href="{{ '/screenshots/icon.png' | relative_url }}" type="image/png">
  <link rel="apple-touch-icon" href="{{ '/screenshots/icon.png' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <a href="{{ '/' | relative_url }}" class="brand">
        <img src="{{ '/screenshots/icon.png' | relative_url }}" alt="" onerror="this.style.display='none'">
        HanziKey
      </a>
      <nav class="site-nav">
        <a href="{{ '/support.html' | relative_url }}">Support</a>
        <a href="{{ '/privacy.html' | relative_url }}">Privacy</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="wrap-narrow content">
      {{ content }}
    </div>
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <div>© <span id="year"></span> HanziKey</div>
      <div>
        <a href="{{ '/support.html' | relative_url }}">Support</a> ·
        <a href="{{ '/privacy.html' | relative_url }}">Privacy</a> ·
        <a href="mailto:michael@hanzikey.com">Contact</a>
      </div>
    </div>
  </footer>
  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>
</body>
</html>
