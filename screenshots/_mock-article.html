<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <title>在城市的边缘阅读</title>
  <style>
    /* Print page setup — letter size with generous margins for an
       article/journal feel. Open in Safari/Chrome, then File → Export
       as PDF (Safari) or Print → Save as PDF (Chrome). */
    @page {
      size: 8.5in 11in;
      margin: 1in 1.1in 1.1in;
    }

    @media print {
      html, body { background: #ffffff !important; }
      .page { box-shadow: none !important; margin: 0 !important; }
    }

    html {
      -webkit-font-smoothing: antialiased;
      background: #e9e4d7; /* soft cream behind the "page" when previewing in browser */
    }

    body {
      margin: 0;
      font-family: "Songti SC", "STSong", "SimSun", "Source Han Serif SC", "Noto Serif CJK SC", serif;
      color: #1f1c18;
      line-height: 1.85;
    }

    .page {
      width: 8.5in;
      min-height: 11in;
      margin: 40px auto;
      padding: 1in 1.1in;
      background: #ffffff;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.08);
      box-sizing: border-box;
      position: relative;
    }

    .eyebrow {
      font-family: "PingFang SC", "Helvetica Neue", "Helvetica", Arial, sans-serif;
      font-size: 11pt;
      letter-spacing: 0.18em;
      color: #8a7d68;
      text-transform: uppercase;
      text-align: center;
      margin: 0 0 18pt;
    }

    h1.title {
      font-family: "Songti SC", "STSong", "SimSun", "Source Han Serif SC", serif;
      font-size: 32pt;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-align: center;
      margin: 0 0 14pt;
      color: #1a1a1a;
    }

    .subtitle {
      font-family: "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      font-size: 11pt;
      color: #6e6557;
      text-align: center;
      margin: 0 0 8pt;
      font-weight: 300;
    }

    .byline {
      font-family: "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      font-size: 10pt;
      color: #8a7d68;
      text-align: center;
      letter-spacing: 0.08em;
      margin: 0 0 36pt;
    }

    .byline .sep {
      margin: 0 8pt;
      color: #c2b8a3;
    }

    .rule {
      width: 32pt;
      height: 1px;
      background: #c2b8a3;
      border: none;
      margin: 0 auto 36pt;
    }

    article p {
      font-size: 14pt;
      text-indent: 2em; /* traditional Chinese paragraph indent */
      margin: 0 0 14pt;
      text-align: justify;
    }

    .folio {
      position: absolute;
      bottom: 0.6in;
      right: 1.1in;
      font-family: "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      font-size: 9pt;
      color: #b3a78f;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <div class="page">
    <p class="eyebrow">随 笔</p>
    <h1 class="title">在城市的边缘阅读</h1>
    <p class="subtitle">一篇关于慢阅读的随笔</p>
    <p class="byline">
      <span>林明</span>
      <span class="sep">·</span>
      <span>2024 年 5 月</span>
    </p>
    <hr class="rule">

    <article>
      <p>清晨六点,我喜欢在街角的咖啡馆里坐下,翻开一本书。窗外的街道还很安静,只有送报纸的人骑着电动车经过。这是我一天中最安静的时间,也是最适合阅读的时刻。</p>

      <p>在这个充满屏幕的时代,纸质书的存在变得越来越珍贵。每翻一页都需要时间,每个字都被印在纸上,无法被滑动或关闭。这种慢慢阅读的方式,让我重新认识了许多熟悉的词语。</p>

      <p>或许,真正的阅读从来不是为了读完一本书,而是为了和文字建立一种关系。在城市的边缘,在咖啡的香气中,我学会了与每一个字慢慢相处。</p>
    </article>

    <div class="folio">— 1 —</div>
  </div>
</body>
</html>
